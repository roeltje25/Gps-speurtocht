<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>De Oude Codex</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap');

:root {
  --gold: #c8a96e;
  --gold-light: #f0d080;
  --gold-dark: #7a5c2a;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%; overflow: hidden;
  background: radial-gradient(ellipse at center, #1a1206 0%, #0a0806 100%);
  font-family: 'Cinzel', serif;
  color: var(--gold);
  user-select: none;
}

.stars {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 8%  12%, rgba(255,255,200,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 68%, rgba(255,255,200,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 45%  8%, rgba(255,255,200,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 67% 85%, rgba(255,255,200,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 83% 33%, rgba(255,255,200,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 12% 78%, rgba(255,255,200,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 55%, rgba(255,255,200,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 92%, rgba(255,255,200,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 18%, rgba(255,255,200,.6) 0%,transparent 100%);
  animation: twinkle 4s infinite alternate;
}
@keyframes twinkle { from{opacity:.5} to{opacity:1} }

/* All sprite-using elements get bg-image via runtime injection — see bottom of HTML */
.sprite-bg { background-repeat: no-repeat; }

.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center;
  transition:opacity .35s, transform .35s;
  z-index:1;
}
.screen.hidden { opacity:0; pointer-events:none; transform:scale(.97); }

/* ══════ SCREEN 1: CODEX ══════ */
#screenCodex {
  overflow-y: auto;
  padding: 10px 14px 20px;
  gap: 10px;
}

.codex-header { text-align: center; flex-shrink:0; }
.codex-header h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1rem, 4.5vw, 1.4rem);
  color: var(--gold-light);
  text-shadow: 0 0 20px rgba(200,169,110,.9), 0 0 40px rgba(200,169,110,.4);
  letter-spacing: 2px;
  animation: titlePulse 3s infinite alternate;
}
@keyframes titlePulse {
  from { text-shadow: 0 0 14px rgba(200,169,110,.7); }
  to   { text-shadow: 0 0 26px rgba(240,208,128,1), 0 0 55px rgba(200,169,110,.7); }
}
.codex-sub {
  font-size: .58rem; letter-spacing: 4px;
  color: var(--gold-dark); text-transform: uppercase; margin-top: 2px;
}

.codex-gps-status {
  margin-top: 6px;
  padding: 4px 10px;
  display: inline-block;
  border: 1px solid var(--gold-dark);
  border-radius: 3px;
  font-size: .55rem;
  letter-spacing: 2px;
  color: var(--gold-dark);
  background: rgba(0,0,0,.4);
  min-height: 20px;
}
.codex-gps-status.ready {
  color: #60ff80;
  border-color: #2a5020;
  background: rgba(0,60,20,.3);
}
.codex-gps-status.error {
  color: #ff7060;
  border-color: #5a2010;
  background: rgba(60,10,0,.3);
}
.codex-gps-status.test {
  color: #ffd060;
  border-color: #5a4010;
  background: rgba(60,40,0,.3);
}

.pip-row { display:flex; gap:10px; justify-content:center; flex-shrink:0; }
.pip {
  width: 10px; height: 10px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #4a3010, #1a1008);
  border: 1px solid var(--gold-dark);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.6);
  transition: background .5s, box-shadow .5s;
}
.pip.lit {
  background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold));
  box-shadow: 0 0 8px var(--gold-light), inset 0 1px 2px rgba(255,220,100,.3);
}

/* Codex stage with sprite book and hotspots */
.codex-stage {
  position: relative;
  width: min(310px, 88vw);
  aspect-ratio: 391 / 370;
  flex-shrink: 0;
}
.codex-book {
  position: absolute; inset: 0;
}

/* Hotspot positions over the empty book's 5 holes */
.hotspot {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  width: 22%;
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  z-index: 3;
}
.hotspot.h0 { top: 23%; left: 51.5%; }
.hotspot.h1 { top: 41%; left: 27%; }
.hotspot.h2 { top: 41%; left: 73.5%; }
.hotspot.h3 { top: 75%; left: 38%; }
.hotspot.h4 { top: 75%; left: 64.5%; }

.hotspot-circle {
  position: absolute; inset: 0;
  border-radius: 50%;
  transition: box-shadow .3s, background .3s;
}
.hotspot:not(.done):hover .hotspot-circle {
  background: radial-gradient(circle, rgba(255,220,100,.22) 0%, transparent 70%);
  box-shadow: 0 0 14px rgba(255,200,80,.5);
}
.hotspot.done { cursor: default; }

.lit-crystal {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 140%;
  aspect-ratio: 1;
  pointer-events: none;
  z-index: 2;
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
}

/* Quest list */
.quest-nav {
  width: 100%; max-width: 380px;
  display: flex; flex-direction: column; gap: 5px;
  flex-shrink: 0;
}
.quest-btn {
  width: 100%; padding: 9px 12px;
  background: linear-gradient(90deg, rgba(139,105,20,.15), rgba(139,105,20,.05));
  border: 1px solid var(--gold-dark);
  border-left: 3px solid var(--gold-dark);
  border-radius: 3px;
  color: var(--gold-light);
  font-family: 'Cinzel', serif;
  font-size: .7rem; letter-spacing: 1.5px;
  cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: 9px;
  transition: background .2s, border-color .2s;
}
.quest-btn:hover:not(.done) {
  background: linear-gradient(90deg, rgba(200,160,48,.2), rgba(139,105,20,.08));
  border-left-color: var(--gold-light);
}
.quest-btn.done { opacity: .4; cursor: default; }
.qnum {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid currentColor;
  font-size: .62rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.qcheck { margin-left: auto; font-size: .9rem; }

.hint-toggle {
  text-align: center; font-size: .5rem; color: #2a1a08;
  cursor: pointer; letter-spacing: 2px; padding: 4px;
  transition: color .3s; width: 100%; max-width: 380px;
}
.hint-toggle:hover { color: var(--gold-dark); }
.hints-panel {
  display: none;
  background: rgba(0,0,0,.6); border: 1px solid var(--gold-dark);
  border-radius: 3px; padding: 10px;
  font-size: .62rem; color: var(--gold-dark); line-height: 2;
  max-width: 380px; width: 100%;
}
.hints-panel.show { display: block; }
.hc { color: var(--gold-light); font-family: monospace; font-size: .85rem; letter-spacing: 3px; }

/* ══════ SCREEN 2: NAV ══════ */
#screenNav { justify-content: flex-start; }

.nav-header {
  width: 100%;
  padding: 10px 14px 8px;
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(180deg, #1a1008, #120e08);
  border-bottom: 2px solid var(--gold-dark);
  flex-shrink: 0;
}

.back-btn {
  width: 46px; height: 46px;
  position: relative;
  border: none;
  cursor: pointer;
  background: transparent;
  flex-shrink: 0;
  padding: 0;
}
.back-btn .sprite-inner {
  position: absolute; inset: 0;
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
}
.back-btn::after {
  content: '◂';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #1a0e00;
  font-size: 1.1rem;
  font-weight: 700;
  padding-bottom: 2px;
  z-index: 2;
  text-shadow: 0 1px 1px rgba(255,220,120,.3);
}

.nav-info { flex: 1; text-align: center; }
.nav-crystal-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: .82rem; letter-spacing: 2px;
  color: var(--gold-light);
  text-shadow: 0 0 12px rgba(200,160,48,.6);
}
.nav-hint-text {
  font-size: .55rem; letter-spacing: 2px;
  color: var(--gold-dark); margin-top: 2px;
}

.compass-area {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 12px 16px; width: 100%;
}

.compass-container {
  position: relative;
  width: min(230px, 60vw);
  aspect-ratio: 236 / 226;
  flex-shrink: 0;
}

.compass-ring {
  position: absolute; inset: 0;
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
}

.compass-needle-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform .4s cubic-bezier(.34, 1.4, .64, 1);
  pointer-events: none;
}

.compass-needle {
  width: 11.5%;
  height: 55%;
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
}

.dist-section {
  width: 100%; max-width: 320px;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
}
.dist-label {
  font-size: .58rem; letter-spacing: 3px;
  color: var(--gold-dark); text-transform: uppercase;
}
.dist-value {
  font-size: 2.2rem; color: var(--gold-light);
  letter-spacing: 3px; line-height: 1;
  text-shadow: 0 0 10px rgba(200,160,48,.4);
  transition: color .5s, text-shadow .5s;
}
.dist-value.close {
  color: #60ff80;
  text-shadow: 0 0 20px #40ff60, 0 0 50px #40ff60;
  animation: distPulse .9s infinite alternate;
}
@keyframes distPulse { from {opacity:.75} to {opacity:1} }

.prox-wrap {
  width: 100%; height: 22px; position: relative;
  background: linear-gradient(180deg, #1a1008, #0a0806);
  border: 2px solid var(--gold-dark);
  border-radius: 4px; overflow: hidden;
  box-shadow: inset 0 2px 6px rgba(0,0,0,.7);
}
.prox-fill {
  height: 100%; width: 0%; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold-dark), #a07820, var(--gold-light));
  transition: width .65s ease, background .5s;
  position: relative;
  box-shadow: 2px 0 8px rgba(200,160,48,.4);
}
.prox-fill::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 8px; height: 100%;
  background: rgba(255,230,120,.35);
}
.prox-fill.close {
  background: linear-gradient(90deg, #1a5a20, #40c050, #60ff70);
  box-shadow: 2px 0 14px #40ff60;
}
.prox-text {
  position: absolute; inset: 0; z-index: 3;
  display: flex; align-items: center; justify-content: center;
  font-size: .55rem; letter-spacing: 2px;
  color: var(--gold-light); text-shadow: 0 1px 2px #000;
}

.unlock-zone {
  font-size: .72rem; letter-spacing: 3px;
  color: #60ff80; text-shadow: 0 0 12px #40ff60;
  text-align: center; opacity: 0;
  transition: opacity .5s;
  animation: uzPulse 1.2s infinite alternate;
}
.unlock-zone.show { opacity: 1; }
@keyframes uzPulse { from {opacity:.6} to {opacity:1} }

.gps-status {
  font-size: .55rem; letter-spacing: 2px;
  color: var(--gold-dark);
  display: flex; align-items: center; gap: 6px;
}
.gps-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #ff3020; flex-shrink: 0;
}
.gps-dot.fix { background: #40ff60; animation: gpsBlink 1.2s infinite; }
@keyframes gpsBlink { 0%,100% {opacity:1} 50% {opacity:.25} }

.code-panel {
  width: 100%; padding: 12px 14px 14px;
  background: linear-gradient(180deg, #1a1008, #100c06);
  border-top: 2px solid var(--gold-dark);
  flex-shrink: 0;
}
.code-row {
  display: flex; gap: 10px; align-items: center;
  justify-content: center; margin-bottom: 6px;
}

.code-input {
  background: linear-gradient(180deg, #0a0806, #120e08);
  border: 2px solid var(--gold-dark);
  border-radius: 4px;
  color: var(--gold-light);
  font-family: 'Cinzel', serif;
  font-size: .95rem; letter-spacing: 5px;
  padding: 10px 12px; width: 145px;
  text-align: center; text-transform: uppercase;
  outline: none;
  box-shadow: inset 0 2px 6px rgba(0,0,0,.6);
}
.code-input:focus {
  border-color: #a07820;
  box-shadow: inset 0 2px 6px rgba(0,0,0,.6), 0 0 10px rgba(200,160,48,.3);
}
.code-input:disabled { opacity: .28; cursor: not-allowed; }
.code-input::placeholder {
  color: var(--gold-dark); opacity: .5; letter-spacing: 3px;
}

.activate-btn {
  width: 60px; height: 60px;
  position: relative;
  border: none;
  cursor: pointer;
  background: transparent;
  flex-shrink: 0;
  padding: 0;
  transition: transform .08s;
}
.activate-btn .sprite-inner {
  position: absolute; inset: 0;
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
}
.activate-btn:active { transform: scale(.94); }
.activate-btn:disabled { opacity: .3; cursor: not-allowed; }
.activate-btn:disabled .sprite-inner { filter: grayscale(.4) brightness(.7); }

.msg-box {
  text-align: center; font-size: .68rem;
  letter-spacing: 2px; min-height: 18px;
}
.msg-box.ok  { color: #60ff80; }
.msg-box.err { color: #ff4040; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
.shake { animation: shake .4s ease-in-out; }

/* Victory */
#victoryOverlay {
  position: fixed; inset: 0; z-index: 50;
  background: radial-gradient(ellipse at center, #1a1008 0%, #0a0806 100%);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 30px;
}
#victoryOverlay.show {
  display: flex;
  animation: fadeIn .9s ease-out;
}
@keyframes fadeIn { from {opacity:0} to {opacity:1} }

.v-codex {
  width: min(220px, 55vw);
  aspect-ratio: 414 / 370;
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
  animation: vFloat 3s infinite ease-in-out;
}
@keyframes vFloat {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-8px) rotate(2deg); }
}

.v-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.2rem, 5vw, 1.8rem);
  color: var(--gold-light);
  margin: 14px 0 8px;
  animation: vGlow 1.5s infinite alternate;
}
@keyframes vGlow {
  from { text-shadow: 0 0 18px var(--gold); }
  to   { text-shadow: 0 0 36px var(--gold-light), 0 0 80px rgba(200,160,48,.8); }
}
.v-text {
  font-size: .76rem; color: var(--gold);
  letter-spacing: 2px; line-height: 1.9;
  max-width: 300px; margin-bottom: 22px;
}
.reset-btn {
  background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold), var(--gold-dark));
  border: none; border-radius: 4px; color: #1a0e00;
  font-family: 'Cinzel', serif; font-size: .62rem;
  font-weight: 600; letter-spacing: 3px;
  padding: 12px 24px; cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 0 0 2px var(--gold-dark), 0 4px 12px rgba(0,0,0,.6);
  transition: transform .1s;
}
.reset-btn:active { transform: scale(.96); }

.particle {
  position: fixed; border-radius: 50%;
  pointer-events: none;
  animation: pFly 1s ease-out forwards; z-index: 200;
}
@keyframes pFly {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

.hotspot.just-filled {
  animation: hotspotFlash 0.8s ease-out;
}
@keyframes hotspotFlash {
  0%   { filter: brightness(1); }
  30%  { filter: brightness(1.6) drop-shadow(0 0 20px var(--cc, gold)); }
  100% { filter: brightness(1); }
}
</style>
</head>
<body>
<div class="stars"></div>

<!-- ══════ SCREEN 1: CODEX ══════ -->
<div class="screen" id="screenCodex">
  <div style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:10px;align-items:center;padding:10px 0 20px;">

    <div class="codex-header">
      <h1>✦ De Oude Codex ✦</h1>
      <div class="codex-sub">Boek der Eeuwige Kristallen</div>
      <div id="codexGpsStatus" class="codex-gps-status"></div>
    </div>

    <div class="pip-row" id="pipRow">
      <div class="pip" id="p0"></div><div class="pip" id="p1"></div>
      <div class="pip" id="p2"></div><div class="pip" id="p3"></div><div class="pip" id="p4"></div>
    </div>

    <div class="codex-stage">
      <div class="codex-book" id="codexBook"></div>
      <div class="hotspot h0" id="hs0"><div class="hotspot-circle"></div></div>
      <div class="hotspot h1" id="hs1"><div class="hotspot-circle"></div></div>
      <div class="hotspot h2" id="hs2"><div class="hotspot-circle"></div></div>
      <div class="hotspot h3" id="hs3"><div class="hotspot-circle"></div></div>
      <div class="hotspot h4" id="hs4"><div class="hotspot-circle"></div></div>
    </div>

    <div class="quest-nav" id="questNav"></div>

    <div class="hint-toggle" onclick="toggleHints()">· · · spelleider · · ·</div>
    <div class="hints-panel" id="hintsPanel"></div>

  </div>
</div>

<!-- ══════ SCREEN 2: NAV ══════ -->
<div class="screen hidden" id="screenNav">

  <div class="nav-header">
    <button class="back-btn" id="backBtn" onclick="goBack()" title="Terug">
      <div class="sprite-inner" id="backBtnSprite"></div>
    </button>
    <div class="nav-info">
      <div class="nav-crystal-name" id="navName"></div>
      <div class="nav-hint-text" id="navHint"></div>
    </div>
    <div style="width:46px"></div>
  </div>

  <div class="compass-area">
    <div class="compass-container">
      <div class="compass-ring" id="compassRing"></div>
      <div class="compass-needle-wrap" id="compassNeedle">
        <div class="compass-needle" id="compassNeedleImg"></div>
      </div>
    </div>

    <div class="dist-section">
      <div class="dist-label">Afstand tot het kristal</div>
      <div class="dist-value" id="distValue">– m</div>

      <div class="prox-wrap">
        <div class="prox-fill" id="proxFill"></div>
        <div class="prox-text" id="proxText">wachten op GPS…</div>
      </div>

      <div class="unlock-zone" id="unlockZone">✦ Kristalzone bereikt — voer de code in ✦</div>

      <div class="gps-status">
        <span class="gps-dot" id="gpsDot"></span>
        <span id="gpsText">GPS ophalen…</span>
      </div>
    </div>
  </div>

  <div class="code-panel">
    <div class="code-row">
      <input class="code-input" id="codeInput" type="text" maxlength="6"
        placeholder="RUNE" autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="this.value=this.value.toUpperCase()" disabled/>
      <button class="activate-btn" id="activateBtn" onclick="checkCode()" disabled title="Activeer">
        <div class="sprite-inner" id="activateBtnSprite"></div>
      </button>
    </div>
    <div class="msg-box" id="msgBox"></div>
  </div>
</div>

<!-- ══════ VICTORY ══════ -->
<div id="victoryOverlay">
  <div class="v-codex" id="victoryCodex"></div>
  <div class="v-title">De Codex is Hersteld!</div>
  <p class="v-text">Alle vijf kristallen zijn gevonden.<br>De Oude Codex straalt weer in zijn volle glorie.<br><br>De wereld is gered!</p>
  <button class="reset-btn" onclick="resetGame()">Begin Opnieuw</button>
</div>

<script>
// ════════════════════════════════════════════

/**
 * Build a CSS string that extracts a single sprite to fill its container.
 * Uses background-image + percentage-based background-position/size so the
 * sprite scales to the container while showing only the correct region.
 */
function spriteBg(spriteName) {
  const s = SPRITES[spriteName];
  if (!s) {
    console.error("Missing sprite:", spriteName);
    return "";
  }
  // background-size: scale the sheet so the sprite (w x h) matches the container (100% x 100%)
  // background-size in percentages = (sheet_dim / sprite_dim * 100)%
  const bgW = (SHEET_W / s.w) * 100;
  const bgH = (SHEET_H / s.h) * 100;
  // background-position: percentage where 100% means "move image so right/bottom aligns"
  // formula: pos% = -x / (sheet_w - sprite_w) * 100
  const pxPercent = s.x / (SHEET_W - s.w) * 100;
  const pyPercent = s.y / (SHEET_H - s.h) * 100;
  return `background-image:${SPRITE_URL};background-size:${bgW}% ${bgH}%;background-position:${pxPercent}% ${pyPercent}%;background-repeat:no-repeat;`;
}

  QUESTS.forEach((q, i) => {
    const off = TEST_OFFSETS[i];
    const dRad = off.distance / R;
    const bRad = off.bearing * Math.PI / 180;
    const latRad = baseLat * Math.PI / 180;
    const lngRad = baseLng * Math.PI / 180;
    const newLat = Math.asin(Math.sin(latRad) * Math.cos(dRad)
      + Math.cos(latRad) * Math.sin(dRad) * Math.cos(bRad));
    const newLng = lngRad + Math.atan2(
      Math.sin(bRad) * Math.sin(dRad) * Math.cos(latRad),
      Math.cos(dRad) - Math.sin(latRad) * Math.sin(newLat)
    );
    q.lat = newLat * 180 / Math.PI;
    q.lng = newLng * 180 / Math.PI;
  });
  testModeReady = true;
  console.log('🧪 Test locations set around', baseLat.toFixed(6), baseLng.toFixed(6));
  QUESTS.forEach((q, i) => console.log(`  ${q.name}: ${TEST_OFFSETS[i].distance}m @ ${TEST_OFFSETS[i].bearing}°`));
}

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let found = JSON.parse(localStorage.getItem('codex_found') || '[]');
let activeQuest = null;
let watchId = null;
let userLat = null, userLng = null, userHeading = null;
let wasInZone = false;
let audioCtx;
const audio = () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
};

// ════════════════════════════════════════════
//  APPLY SPRITES TO STATIC ELEMENTS
// ════════════════════════════════════════════
function applyStaticSprites() {
  document.getElementById('compassRing').style.cssText += spriteBg('compass_ring');
  document.getElementById('compassNeedleImg').style.cssText += spriteBg('compass_needle');
  document.getElementById('backBtnSprite').style.cssText += spriteBg('button_idle');
  document.getElementById('activateBtnSprite').style.cssText += spriteBg('button_idle');
  document.getElementById('victoryCodex').style.cssText += spriteBg('codex_full');
}

// Toggle activate button pressed look via event
function bindButtonPress() {
  const btn = document.getElementById('activateBtn');
  const sprite = document.getElementById('activateBtnSprite');
  btn.addEventListener('pointerdown', () => {
    if (!btn.disabled) sprite.style.cssText = spriteBg('button_pressed');
  });
  const release = () => { sprite.style.cssText = spriteBg('button_idle'); };
  btn.addEventListener('pointerup', release);
  btn.addEventListener('pointerleave', release);
  btn.addEventListener('pointercancel', release);

  const back = document.getElementById('backBtn');
  const backSp = document.getElementById('backBtnSprite');
  back.addEventListener('pointerdown', () => {
    backSp.style.cssText = spriteBg('button_pressed');
  });
  const releaseBack = () => { backSp.style.cssText = spriteBg('button_idle'); };
  back.addEventListener('pointerup', releaseBack);
  back.addEventListener('pointerleave', releaseBack);
  back.addEventListener('pointercancel', releaseBack);
}

// ════════════════════════════════════════════
//  RENDER CODEX
// ════════════════════════════════════════════
function renderCodex() {
  // Pips
  QUESTS.forEach((_, i) => {
    document.getElementById('p' + i).classList.toggle('lit', found.includes(i));
  });

  // Book — always show empty; crystals appear on hotspots when found
  const book = document.getElementById('codexBook');
  book.style.cssText = spriteBg('codex_empty');

  // Each hotspot
  QUESTS.forEach(q => {
    const hs = document.getElementById('hs' + q.slot);
    if (!hs) return;
    hs.innerHTML = '<div class="hotspot-circle"></div>';
    hs.style.setProperty('--cc', q.cssColor);
    if (found.includes(q.id)) {
      const spriteName = 'crystal_' + q.color + '_lit';
      const crystalEl = document.createElement('div');
      crystalEl.className = 'lit-crystal';
      crystalEl.style.cssText += spriteBg(spriteName);
      crystalEl.style.filter = 'drop-shadow(0 0 10px ' + q.cssColor + '88)';
      hs.appendChild(crystalEl);
      hs.classList.add('done');
      hs.onclick = null;
    } else {
      const unlitEl = document.createElement('div');
      unlitEl.className = 'lit-crystal';
      unlitEl.style.cssText += spriteBg('crystal_' + q.color + '_unlit');
      unlitEl.style.opacity = '0.35';
      hs.appendChild(unlitEl);
      hs.classList.remove('done');
      hs.onclick = () => openNav(q.id);
    }
  });

  // Quest list
  document.getElementById('questNav').innerHTML = QUESTS.map(q => {
    const ok = found.includes(q.id);
    const onClick = ok ? '' : 'onclick="openNav(' + q.id + ')"';
    return '<button class="quest-btn ' + (ok ? 'done' : '') + '" ' + onClick + ' '
      + 'style="color:' + (ok ? 'var(--gold-dark)' : q.cssColor) + '; '
      + 'border-left-color:' + (ok ? 'var(--gold-dark)' : q.cssColor) + '">'
      + '<span class="qnum" style="border-color:' + q.cssColor + '">'
      + (ok ? '✦' : (q.id + 1)) + '</span>'
      + '<span style="flex:1">' + q.name
      + ' <span style="font-size:.55rem; color:var(--gold-dark)"> — ' + q.hint + '</span></span>'
      + '<span class="qcheck">' + (ok ? '✦' : '') + '</span>'
      + '</button>';
  }).join('');

  // Hint panel
  renderHintsPanel();
}

function renderHintsPanel() {
  const rows = QUESTS.map((q, i) => {
    const off = TEST_MODE ? TEST_OFFSETS[i] : null;
    const locInfo = TEST_MODE
      ? `${off.distance}m @ ${off.bearing}° (${q.lat.toFixed(6)}, ${q.lng.toFixed(6)})`
      : `(${q.lat}, ${q.lng})`;
    return `${q.name} → <span class="hc">${q.code}</span><br>
      &nbsp;&nbsp;<span style="font-size:.55rem">${locInfo}</span><br>`;
  }).join('');

  const modeLabel = TEST_MODE
    ? '<strong style="color:#40FF60">🧪 TEST MODE actief</strong> — locaties rond jouw positie.<br><br>'
    : '';

  document.getElementById('hintsPanel').innerHTML =
    modeLabel +
    '<strong>Codes voor spelleider:</strong><br>' +
    rows +
    '<br><em style="color:#4a3010; font-size:.55rem">Pas QUESTS[] en TEST_MODE bovenaan de JS aan.</em>';
}

// ════════════════════════════════════════════
//  NAVIGATION SCREEN
// ════════════════════════════════════════════
function openNav(qid) {
  activeQuest = QUESTS[qid];
  wasInZone = false;

  document.getElementById('navName').textContent = activeQuest.name;
  document.getElementById('navHint').textContent = '✦ ' + activeQuest.hint + ' ✦';
  document.getElementById('distValue').textContent = '– m';
  document.getElementById('distValue').classList.remove('close');
  document.getElementById('proxFill').style.width = '0%';
  document.getElementById('proxFill').classList.remove('close');
  document.getElementById('proxText').textContent = 'wachten op GPS…';
  document.getElementById('unlockZone').classList.remove('show');
  document.getElementById('msgBox').textContent = '';
  document.getElementById('msgBox').className = 'msg-box';
  document.getElementById('codeInput').value = '';
  document.getElementById('codeInput').disabled = true;
  document.getElementById('activateBtn').disabled = true;

  document.getElementById('screenCodex').classList.add('hidden');
  document.getElementById('screenNav').classList.remove('hidden');

  startGPS();
  startOrientation();
}

function goBack() {
  stopGPS();
  stopOrientation();
  activeQuest = null;
  document.getElementById('screenNav').classList.add('hidden');
  document.getElementById('screenCodex').classList.remove('hidden');
}

// ════════════════════════════════════════════
//  GPS
// ════════════════════════════════════════════
function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gpsText').textContent = 'Geen GPS';
    return;
  }
  watchId = navigator.geolocation.watchPosition(
    onGPS,
    err => {
      document.getElementById('gpsText').textContent = 'GPS fout';
      document.getElementById('gpsDot').classList.remove('fix');
    },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 12000 }
  );
}
function stopGPS() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
}

function onGPS(pos) {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  document.getElementById('gpsDot').classList.add('fix');
  document.getElementById('gpsText').textContent = 'GPS ±' + Math.round(pos.coords.accuracy) + 'm';

  // Test mode: on first GPS fix, generate test locations relative to current position
  if (TEST_MODE && !testModeReady) {
    applyTestOffsets(userLat, userLng);
    // Also update the hints panel in case spelleider opens it
    renderHintsPanel();
  }

  if (activeQuest) updateNav();
}

function haversine(la1, lo1, la2, lo2) {
  const R = 6371000;
  const dLa = (la2 - la1) * Math.PI / 180;
  const dLo = (lo2 - lo1) * Math.PI / 180;
  const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180) * Math.cos(la2*Math.PI/180) * Math.sin(dLo/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function bearing(la1, lo1, la2, lo2) {
  const dL = (lo2 - lo1) * Math.PI / 180;
  const y = Math.sin(dL) * Math.cos(la2 * Math.PI/180);
  const x = Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)
          - Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos(dL);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function updateNav() {
  if (userLat === null || !activeQuest) return;
  const dist = haversine(userLat, userLng, activeQuest.lat, activeQuest.lng);
  const bear = bearing(userLat, userLng, activeQuest.lat, activeQuest.lng);

  const dv = document.getElementById('distValue');
  dv.textContent = dist < 1000 ? Math.round(dist) + ' m' : (dist/1000).toFixed(1) + ' km';

  const inZone = dist <= UNLOCK_RADIUS;
  dv.classList.toggle('close', inZone);

  const pct = Math.max(0, Math.min(100, (1 - dist/200) * 100));
  const fill = document.getElementById('proxFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('close', inZone);

  document.getElementById('proxText').textContent = inZone
    ? '✦ In de kristalzone ✦'
    : (dist < 1000 ? Math.round(dist) + 'm te gaan' : (dist/1000).toFixed(1) + ' km te gaan');

  document.getElementById('unlockZone').classList.toggle('show', inZone);

  if (inZone && !wasInZone) {
    wasInZone = true;
    playUnlock();
    document.getElementById('codeInput').disabled = false;
    document.getElementById('activateBtn').disabled = false;
    if (navigator.vibrate) navigator.vibrate([100, 60, 100, 60, 250]);
  }
  if (!inZone && wasInZone) {
    wasInZone = false;
    document.getElementById('codeInput').disabled = true;
    document.getElementById('activateBtn').disabled = true;
  }

  const rel = userHeading !== null ? (bear - userHeading + 360) % 360 : bear;
  document.getElementById('compassNeedle').style.transform = 'rotate(' + rel + 'deg)';
}

// ════════════════════════════════════════════
//  ORIENTATION
// ════════════════════════════════════════════
function startOrientation() {
  if (typeof DeviceOrientationEvent !== 'undefined'
   && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r => { if (r === 'granted') window.addEventListener('deviceorientation', onOrient); })
      .catch(() => {});
  } else {
    window.addEventListener('deviceorientation', onOrient);
  }
}
function stopOrientation() { window.removeEventListener('deviceorientation', onOrient); }
function onOrient(e) {
  if (e.webkitCompassHeading !== undefined) userHeading = e.webkitCompassHeading;
  else if (e.alpha !== null) userHeading = (360 - e.alpha) % 360;
  updateNav();
}

// ════════════════════════════════════════════
//  SOUND
// ════════════════════════════════════════════
function playSuccess() {
  const ctx = audio(), t = ctx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i*.12);
    g.gain.linearRampToValueAtTime(.35, t + i*.12 + .02);
    g.gain.exponentialRampToValueAtTime(.001, t + i*.12 + .55);
    o.start(t + i*.12); o.stop(t + i*.12 + .7);
  });
  setTimeout(() => {
    const ctx = audio(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = 2093;
    g.gain.setValueAtTime(.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .9);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 1);
  }, 490);
}
function playFail() {
  const ctx = audio(), t = ctx.currentTime;
  [220, 185].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth'; o.frequency.value = f;
    g.gain.setValueAtTime(.22, t + i*.19);
    g.gain.exponentialRampToValueAtTime(.001, t + i*.19 + .45);
    o.start(t + i*.19); o.stop(t + i*.19 + .55);
  });
}
function playUnlock() {
  const ctx = audio(), o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sine'; o.frequency.value = 432;
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(.14, ctx.currentTime + .3);
  g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + 1.3);
  o.start(ctx.currentTime); o.stop(ctx.currentTime + 1.5);
}

// ════════════════════════════════════════════
//  CODE CHECK
// ════════════════════════════════════════════
function checkCode() {
  if (!activeQuest) return;
  const val = document.getElementById('codeInput').value.trim().toUpperCase();
  const msg = document.getElementById('msgBox');

  if (val === activeQuest.code) {
    playSuccess();
    spawnParticles(activeQuest.cssColor);

    found.push(activeQuest.id);
    localStorage.setItem('codex_found', JSON.stringify(found));

    msg.textContent = '✦ ' + activeQuest.name + ' geplaatst! ✦';
    msg.className = 'msg-box ok';

    document.getElementById('codeInput').disabled = true;
    document.getElementById('activateBtn').disabled = true;

    setTimeout(() => {
      stopGPS();
      stopOrientation();
      document.getElementById('screenNav').classList.add('hidden');
      document.getElementById('screenCodex').classList.remove('hidden');

      renderCodex();
      const hs = document.getElementById('hs' + activeQuest.slot);
      if (hs) {
        hs.classList.add('just-filled');
        setTimeout(() => hs.classList.remove('just-filled'), 1200);
      }

      activeQuest = null;

      if (found.length === QUESTS.length) {
        setTimeout(showVictory, 900);
      }
    }, 1500);
  } else {
    playFail();
    msg.textContent = 'Foute runecode — probeer opnieuw.';
    msg.className = 'msg-box err';
    const inp = document.getElementById('codeInput');
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 450);
    inp.value = '';
  }
}

document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkCode();
});

// ════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════
function spawnParticles(mainColor) {
  const cols = [mainColor, '#C8A030', '#FFD060', '#FFFFFF', mainColor];
  for (let i = 0; i < 32; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const sz = 3 + Math.random()*7;
    const ang = Math.random()*360;
    const d = 70 + Math.random()*140;
    el.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;'
      + 'background:' + cols[Math.floor(Math.random()*cols.length)] + ';'
      + 'left:50%;top:50%;'
      + '--tx:' + (Math.cos(ang*Math.PI/180)*d) + 'px;'
      + '--ty:' + (Math.sin(ang*Math.PI/180)*d) + 'px;'
      + 'animation-duration:' + (.6+Math.random()*.6) + 's;';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

// ════════════════════════════════════════════
//  VICTORY
// ════════════════════════════════════════════
function showVictory() {
  playSuccess();
  setTimeout(playSuccess, 700);
  QUESTS.forEach(q => spawnParticles(q.cssColor));
  document.getElementById('victoryOverlay').classList.add('show');
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function resetGame() {
  found = [];
  localStorage.removeItem('codex_found');
  document.getElementById('victoryOverlay').classList.remove('show');
  renderCodex();
}
function toggleHints() {
  document.getElementById('hintsPanel').classList.toggle('show');
}

// ════════════════════════════════════════════
//  GPS STATUS BADGE on codex screen
// ════════════════════════════════════════════
function updateCodexGpsBadge(state, text) {
  const el = document.getElementById('codexGpsStatus');
  if (!el) return;
  el.className = 'codex-gps-status ' + (state || '');
  el.textContent = text;
}

// Prewarm GPS on page load so test locations are set before user clicks a crystal
function prewarmGPS() {
  if (!navigator.geolocation) {
    updateCodexGpsBadge('error', '⚠ geen GPS beschikbaar');
    return;
  }
  if (TEST_MODE) {
    updateCodexGpsBadge('test', '🧪 TEST MODE — GPS zoeken…');
  } else {
    updateCodexGpsBadge('', 'GPS zoeken…');
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      if (TEST_MODE && !testModeReady) {
        applyTestOffsets(userLat, userLng);
        renderHintsPanel();
        updateCodexGpsBadge('ready',
          '🧪 Test-locaties klaar (±' + Math.round(pos.coords.accuracy) + 'm)');
      } else {
        updateCodexGpsBadge('ready',
          'GPS actief · ±' + Math.round(pos.coords.accuracy) + 'm');
      }
    },
    (err) => {
      let msg = '⚠ GPS fout';
      if (err.code === 1) msg = '⚠ GPS geweigerd — sta locatie toe';
      else if (err.code === 2) msg = '⚠ GPS niet beschikbaar';
      else if (err.code === 3) msg = '⚠ GPS timeout';
      updateCodexGpsBadge('error', msg);
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

// ─── INIT ───────────────────────────────────
applyStaticSprites();
bindButtonPress();
renderCodex();
prewarmGPS();
</script>
